<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🔒 Super Admin Executive Control Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 p-8 hidden" id="adminBodyShell">

    <div class="max-w-6xl mx-auto space-y-6">
        <div class="flex justify-between items-center border-b border-slate-800 pb-4">
            <h1 class="text-xl font-black text-white uppercase tracking-wider">Master Ledger System Control Core Terminal</h1>
            <a href="../index.html" class="bg-rose-600 px-4 py-2 text-xs font-bold rounded-xl">Disconnect Base</a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <form class="lg:col-span-2 bg-slate-800 p-6 rounded-2xl border border-slate-700 space-y-4" onsubmit="handleDirectBroadcastSubmit(event)">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Target Module Template Routing</label>
                        <select id="postRoute" class="w-full bg-slate-900 border border-slate-700 text-xs p-3 rounded-xl text-white outline-none">
                            <option value="job">job.html Layout (Standard Cards Grid)</option>
                            <option value="yojna">yojna.html Layout (Paisabazaar Rich Content Wiki)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Command Authority Board</label>
                        <input type="text" id="postAuth" required class="w-full bg-slate-900 border border-slate-700 text-xs p-3 rounded-xl text-white outline-none" placeholder="e.g. Ministry of Finance, India">
                    </div>
                </div>

                <input type="text" id="postTitle" required class="w-full bg-slate-900 border border-slate-700 text-xs p-3 rounded-xl text-white outline-none" placeholder="Enter Full Dynamic Header Information Description">
                
                <div class="grid grid-cols-3 gap-3 bg-slate-950 p-4 rounded-xl border border-slate-800">
                    <div>
                        <label class="block text-[9px] font-bold text-slate-400 uppercase">Image View Rule Target</label>
                        <select id="imgViewLoc" class="w-full bg-slate-800 border text-[10px] p-2 rounded-lg text-white"><option value="both">Both (Card & Detail Page)</option><option value="front">Front Card Only</option><option value="post">Post Detail Screen Only</option></select>
                    </div>
                    <div>
                        <label class="block text-[9px] font-bold text-slate-400 uppercase">Custom Font Scaling Size</label>
                        <select id="fontSize" class="w-full bg-slate-800 border text-[10px] p-2 rounded-lg text-white"><option value="15px">15px Base</option><option value="17px" selected>17px Clean Readable</option><option value="20px">20px Strong Accent</option></select>
                    </div>
                    <div>
                        <label class="block text-[9px] font-bold text-slate-400 uppercase">Dynamic Hex Font Color</label>
                        <input type="color" id="fontColor" value="#ffffff" class="w-full h-8 bg-slate-800 border rounded-lg p-1">
                    </div>
                </div>

                <textarea id="postFees" rows="3" placeholder="Application Fees Matrix Breakdown..." class="w-full bg-slate-900 border border-slate-700 text-xs p-3 rounded-xl text-white outline-none"></textarea>
                <textarea id="postElig" rows="3" placeholder="Eligibility Criteria Specifications Guidelines..." class="w-full bg-slate-900 border border-slate-700 text-xs p-3 rounded-xl text-white outline-none"></textarea>
                
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs py-3.5 rounded-xl">Broadcast Globally Live Live 🚀</button>
            </form>

            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700"><h3 class="text-xs font-bold uppercase text-slate-400 border-b border-slate-700 pb-2 mb-3">Pending User Approval Queues</h3><div id="approvalLedger" class="space-y-3"></div></div>
        </div>
    </div>

    <script type="module">
        import { collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import "../app.js";

        // Secret Challenge Gate Encryption Validation
        window.addEventListener('DOMContentLoaded', () => {
            const token = prompt("🚨 HIGH SECURITY CLEARANCE WARNING:\nEnter Secure Admin Authorization Token Key:");
            if(token === "Admin@2026") {
                document.getElementById('adminBodyShell').classList.remove('hidden');
                initAdminDashboardRealtimeSync();
            } else { alert("Breach Deflected. Session Terminated."); window.location.href = "../index.html"; }
        });

        async function initAdminDashboardRealtimeSync() {
            onSnapshot(collection(window.fbDB, "jobs"), (snapshot) => {
                const container = document.getElementById('approvalLedger');
                container.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    if(data.approvalStatus === 'Pending for Approval') {
                        container.innerHTML += `
                            <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 space-y-2">
                                <h4 class="text-xs font-bold text-white">${data.title}</h4>
                                <span class="text-[9px] font-bold text-amber-500 uppercase bg-amber-500/10 px-1.5 py-0.5 border border-amber-500/20 rounded">Pending Writer Node</span>
                                <div class="flex gap-2 pt-1"><button onclick="approveNode('${docSnap.id}')" class="flex-1 bg-emerald-600 text-[10px] font-bold py-1 rounded">✓ Approve</button><button onclick="dropNode('${docSnap.id}')" class="bg-rose-600 text-[10px] px-2 rounded">✕ Drop</button></div>
                            </div>
                        `;
                    }
                });
            });
        }

        window.handleDirectBroadcastSubmit = async function(e) {
            e.preventDefault();
            await addDoc(collection(window.fbDB, "jobs"), {
                type: document.getElementById('postRoute').value,
                authority: document.getElementById('postAuth').value.trim(),
                title: document.getElementById('postTitle').value.trim(),
                imgDisplayLocation: document.getElementById('imgViewLoc').value,
                customFontSize: document.getElementById('fontSize').value,
                customFontColor: document.getElementById('fontColor').value,
                feesDetails: document.getElementById('postFees').value.trim(),
                eligibility: document.getElementById('postElig').value.trim(),
                approvalStatus: "Live", authorName: "Super Admin"
            });
            alert("Broadcast Completed Successfully!");
        };

        window.approveNode = async function(id) { await updateDoc(doc(window.fbDB, "jobs", id), { approvalStatus: "Live" }); };
        window.dropNode = async function(id) { await deleteDoc(doc(window.fbDB, "jobs", id)); };
    </script>
</body>
</html>

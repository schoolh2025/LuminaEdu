<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaEdu | Premium Career Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Noto+Sans+Devanagari:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans Devanagari', sans-serif; background: linear-gradient(135deg, #e0f2fe 0%, #fae8ff 100%); background-attachment: fixed; }
        .premium-glass-card { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 1.25rem; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full bg-white/70 backdrop-blur-md border-b border-slate-200/60 px-4 lg:px-10 py-3.5 flex items-center justify-between shadow-sm shrink-0">
        <div class="flex items-center gap-3 cursor-pointer" onclick="window.navigateToHub('front')">
            <div class="bg-indigo-600 text-white font-black p-2.5 rounded-xl text-lg shadow-md">LE</div>
            <h1 class="text-xl md:text-2xl font-black text-slate-900 tracking-tight">Lumina<span class="text-indigo-600">Edu</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="window.handleRenderPolicyDocumentNode('privacy-policy')" class="bg-amber-600 hover:bg-amber-700 text-white font-bold text-xs md:text-sm px-4 py-2.5 rounded-xl transition-all whitespace-nowrap">📄 Page Builder Info</button>
            <a href="user/login.html" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs md:text-sm px-5 py-2.5 rounded-xl shadow-md transition-all whitespace-nowrap">Contributor Login 🚀</a>
        </div>
    </header>

    <div class="flex-1 w-full flex flex-col md:flex-row min-h-0">
        
        <aside id="mainLeftSidebarNode" class="w-full md:w-64 bg-white/80 backdrop-blur-md border-r p-5 flex flex-col shrink-0">
            <div class="space-y-4">
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider px-2">Navigation Links</p>
                <nav class="space-y-1">
                    <button onclick="window.setJobFilter('All')" class="w-full flex items-center gap-3 px-4 py-2.5 bg-indigo-50 text-indigo-700 font-bold text-sm rounded-xl">💼 All Updates</button>
                    <button onclick="window.handleRenderPolicyDocumentNode('privacy-policy')" class="w-full flex items-center gap-3 px-4 py-2.5 text-slate-700 hover:bg-slate-100 font-bold text-sm rounded-xl text-left">📄 Custom Pages Node</button>
                </nav>
                
                <div class="pt-4 border-t">
                    <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">🧰 Useful Tools</p>
                    <div id="publicPdfToolsListTargetStack" class="space-y-1"></div>
                </div>
            </div>
        </aside>

        <div class="flex-1 flex flex-col w-full min-w-0">
            <div class="p-4 lg:p-8 max-w-[1400px] w-full mx-auto">
                <div id="coreContentLayoutViewRegion" class="space-y-6 w-full">
                    
                    <div id="mainFeedRouterBlock" class="space-y-6">
                        <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 bg-white/40 p-4 rounded-2xl border">
                            <div>
                                <h2 class="text-xl font-black text-slate-900">Sarkari Yojana, Jobs & Results</h2>
                            </div>
                            <div class="flex flex-wrap gap-1.5" id="categoryFilterContainer"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="publicCardsFeed"></div>
                    </div>

                    <div id="postDetailView" class="hidden premium-glass-card p-6 bg-white w-full">
                        <button onclick="window.performSinglePageRoutingView('front')" class="mb-6 text-xs font-bold text-indigo-600 bg-indigo-50 px-4 py-2 rounded-xl">← Back to Home</button>
                        <div id="detailViewContentPayload" class="prose max-w-none text-slate-800"></div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <footer class="w-full bg-slate-900 border-t px-4 lg:px-10 py-4 flex flex-col sm:flex-row items-center justify-between gap-3 text-xs text-slate-400 shrink-0">
        <p>© 2026 LuminaEdu Systems. All Rights Reserved.</p>
        <div class="flex flex-wrap gap-x-4 font-semibold text-slate-300">
            <button onclick="window.handleRenderPolicyDocumentNode('privacy-policy')" class="hover:text-white">Privacy Policy</button>
            <button onclick="window.handleRenderPolicyDocumentNode('terms-of-service')" class="hover:text-white">Terms of Service</button>
            <button onclick="window.handleRenderPolicyDocumentNode('disclaimer')" class="hover:text-white">Disclaimer</button>
            <button onclick="window.handleRenderPolicyDocumentNode('contact-us')" class="hover:text-white">Contact Us</button>
        </div>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>

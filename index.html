<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LuminaEdu - Educational & Sarkari Portal Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-gradient-to-tr from-sky-100 via-indigo-50 to-pink-100 min-h-screen">

    <header class="h-16 bg-white/40 backdrop-blur-md border-b border-white/30 px-6 flex items-center justify-between sticky top-0 z-50">
        <h1 class="text-xl font-black text-slate-800 tracking-tight">LuminaEdu</h1>
        <button onclick="toggleAuthOverlay(true)" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs px-4 py-2 rounded-xl shadow-lg shadow-indigo-100 transition-all">
            Join / Sign In as Contributor 🚀
        </button>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div class="mb-6 flex gap-2" id="categoryFilterContainer">
            </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="publicCardsFeed">
            </div>
    </main>

    <div id="authModalOverlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-all duration-300">
        <div class="bg-white/80 backdrop-blur-xl border border-white/50 max-w-sm w-full m-4 p-6 rounded-3xl shadow-2xl relative">
            <button onclick="toggleAuthOverlay(false)" class="absolute top-4 right-4 text-slate-400 font-bold hover:text-slate-600">✕</button>
            
            <div class="flex border-b text-xs font-bold mb-4">
                <button id="tabLogin" onclick="switchAuthForm('login')" class="flex-1 pb-2 border-b-2 border-indigo-600 text-indigo-600">User Login</button>
                <button id="tabReg" onclick="switchAuthForm('reg')" class="flex-1 pb-2 text-slate-400">User Registration</button>
            </div>

            <div class="space-y-3">
                <div id="regNameBlock" class="hidden">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase">Your Full Name</label>
                    <input type="text" id="usrName" class="w-full bg-white/70 border text-xs p-2.5 rounded-xl outline-none" placeholder="Alex Mercer">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase">Email Destination</label>
                    <input type="email" id="usrEmail" class="w-full bg-white/70 border text-xs p-2.5 rounded-xl outline-none" placeholder="name@domain.com">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase">Secure Password</label>
                    <input type="password" id="usrPass" class="w-full bg-white/70 border text-xs p-2.5 rounded-xl outline-none" placeholder="••••••••">
                </div>
                <button onclick="executeAuthActionPipeline()" class="w-full bg-indigo-600 text-white font-bold text-xs py-3 rounded-xl shadow-md">Execute Verification ⚡</button>
                <button onclick="executeForgotRemapPipeline()" class="w-full text-center text-[10px] text-slate-400 font-bold hover:underline">Forgot Password? (Remap Node)</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        let currentAuthMode = 'login';
        window.toggleAuthOverlay = function(show) {
            const overlay = document.getElementById('authModalOverlay');
            if(show) { overlay.classList.remove('hidden'); setTimeout(() => { overlay.classList.remove('opacity-0'); }, 10); }
            else { overlay.classList.add('opacity-0'); setTimeout(() => { overlay.classList.add('hidden'); }, 300); }
        };
        window.switchAuthForm = function(mode) {
            currentAuthMode = mode;
            document.getElementById('regNameBlock').classList.toggle('hidden', mode === 'login');
            document.getElementById('tabLogin').className = mode === 'login' ? 'flex-1 pb-2 border-b-2 border-indigo-600 text-indigo-600' : 'flex-1 pb-2 text-slate-400';
            document.getElementById('tabReg').className = mode === 'reg' ? 'flex-1 pb-2 border-b-2 border-indigo-600 text-indigo-600' : 'flex-1 pb-2 text-slate-400';
        };
        window.executeAuthActionPipeline = function() {
            const email = document.getElementById('usrEmail').value.trim();
            const pass = document.getElementById('usrPass').value.trim();
            if(currentAuthMode === 'login') {
                window.loginUserNode(email, pass);
            } else {
                const name = document.getElementById('usrName').value.trim();
                window.registerNewUserNode(email, pass, name);
            }
        };
        window.executeForgotRemapPipeline = function() {
            window.triggerForgotRecoveryNode(document.getElementById('usrEmail').value.trim());
        }
    </script>
</body>
</html>

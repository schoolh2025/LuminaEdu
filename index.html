<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LuminaEdu Hub | Gateways Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(circle at top right, #e0e7ff, #f8fafc); }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white/70 backdrop-blur-xl border border-white/40 p-8 rounded-3xl shadow-2xl">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">LuminaEdu Digital System</h1>
            <p class="text-xs font-semibold text-indigo-600 mt-1">Sarkari Gateways Information Repository Node</p>
        </div>

        <!-- System Authentication Form Wrapper -->
        <div class="space-y-4">
            <div class="flex border-b border-slate-200 text-sm font-bold mb-4">
                <button id="tabL" onclick="switchAuthTab('login')" class="flex-1 pb-2 border-b-2 border-indigo-600 text-indigo-600">Secure Sign In</button>
                <button id="tabR" onclick="switchAuthTab('reg')" class="flex-1 pb-2 text-slate-400 border-transparent">Create Account</button>
            </div>

            <div id="nameBlock" class="hidden">
                <label class="block text-xs font-bold text-slate-600 mb-1">Full Identity Name</label>
                <input type="text" id="authName" class="w-full text-xs p-3 bg-white border rounded-xl outline-none" placeholder="Your Full Name">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-600 mb-1">Electronic Mail Node Address</label>
                <input type="email" id="authEmail" class="w-full text-xs p-3 bg-white border rounded-xl outline-none" placeholder="name@domain.com">
            </div>

            <div id="passBlock">
                <label class="block text-xs font-bold text-slate-600 mb-1">System Security Credentials Matrix</label>
                <input type="password" id="authPass" class="w-full text-xs p-3 bg-white border rounded-xl outline-none" placeholder="••••••••">
            </div>

            <button onclick="handleAuthTrigger()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs py-3.5 rounded-xl shadow-lg shadow-indigo-200 transition-all">Execute Operations Gateway 🚀</button>
            
            <div class="text-center mt-3">
                <button onclick="triggerRecovery()" class="text-[11px] font-bold text-slate-400 hover:text-indigo-600">Request Password Node Remapping? (Forgot Password)</button>
            </div>
        </div>
    </div>

    <script type="module">
        import "./app.js";
        let activeMode = 'login';
        window.switchAuthTab = function(mode) {
            activeMode = mode;
            document.getElementById('nameBlock').classList.toggle('hidden', mode === 'login');
            document.getElementById('tabL').className = mode === 'login' ? 'flex-1 pb-2 border-b-2 border-indigo-600 text-indigo-600' : 'flex-1 pb-2 text-slate-400';
            document.getElementById('tabR').className = mode === 'reg' ? 'flex-1 pb-2 border-b-2 border-indigo-600 text-indigo-600' : 'flex-1 pb-2 text-slate-400';
        };
        window.handleAuthTrigger = function() {
            const email = document.getElementById('authEmail').value.trim();
            const pass = document.getElementById('authPass').value.trim();
            if(activeMode === 'login') {
                window.loginUserNode(email, pass);
            } else {
                const name = document.getElementById('authName').value.trim();
                window.registerNewUserNode(email, pass, name);
            }
        };
        window.triggerRecovery = function() {
            const email = document.getElementById('authEmail').value.trim();
            window.triggerForgotRecoveryNode(email);
        }
    </script>
</body>
</html>

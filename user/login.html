<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminaEdu | Authentication Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #e0f2fe 0%, #fae8ff 100%);
        }
        .premium-glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- Navbar Header -->
    <header class="w-full bg-white/60 backdrop-blur-md border-b border-slate-200/50 px-6 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-2.5 cursor-pointer" onclick="window.location.href='../index.html'">
            <div class="bg-indigo-600 text-white font-black p-2 rounded-xl text-sm">LE</div>
            <h1 class="text-lg font-black text-slate-900">Lumina<span class="text-indigo-600">Edu</span></h1>
        </div>
        <a href="../index.html" class="text-xs font-bold text-slate-500 hover:text-slate-900 transition-all">← Back to Home</a>
    </header>

    <!-- MAIN SINGLE-PAGE AUTH HUB -->
    <main class="flex-1 flex items-center justify-center p-4 my-6">
        <div class="max-w-md w-full premium-glass-card p-6 md:p-8 space-y-6 border">
            
            <!-- Dynamic Headers -->
            <div class="text-center space-y-1.5">
                <h2 id="authInterfaceHeading" class="text-2xl font-black text-slate-900 tracking-tight">Contributor Sign In</h2>
                <p id="authInterfaceSubLabel" class="text-xs text-slate-400 font-medium">Verify email & password to input proposed updates.</p>
            </div>

            <!-- TAB 1: LOGIN SEGMENT (EMAIL & PASSWORD) -->
            <div id="authLoginSegment" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">Email Address</label>
                    <input type="email" id="loginEmail" class="w-full bg-white border border-slate-200 p-3 rounded-xl text-sm outline-none focus:border-indigo-500" placeholder="name@example.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">Password</label>
                    <input type="password" id="loginPassword" class="w-full bg-white border border-slate-200 p-3 rounded-xl text-sm outline-none focus:border-indigo-500" placeholder="••••••••">
                </div>
                <button id="executeLoginTriggerBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black text-sm py-3.5 rounded-xl shadow-md transition-all">Log In Securely ⚡</button>
                <div class="flex items-center justify-between text-xs pt-1">
                    <button onclick="window.shiftAuthSegmentView('forgot')" class="text-slate-400 font-bold hover:text-slate-600 hover:underline">Forgot Password?</button>
                    <button onclick="window.shiftAuthSegmentView('register')" class="text-indigo-600 font-black hover:text-indigo-700 hover:underline">Create Account</button>
                </div>
            </div>

            <!-- TAB 2: REGISTER SEGMENT (NAME, EMAIL, PASSWORD, DOB) -->
            <div id="authRegisterSegment" class="hidden space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">Full Name</label>
                    <input type="text" id="regName" class="w-full bg-white border border-slate-200 p-3 rounded-xl text-sm outline-none focus:border-emerald-500" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">Email Address</label>
                    <input type="email" id="regEmail" class="w-full bg-white border border-slate-200 p-3 rounded-xl text-sm outline-none focus:border-emerald-500" placeholder="name@example.com">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">Password</label>
                        <input type="password" id="regPassword" class="w-full bg-white border border-slate-200 p-3 rounded-xl text-sm outline-none focus:border-emerald-500" placeholder="••••••••">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">Date of Birth (DOB)</label>
                        <input type="date" id="regDob" class="w-full bg-white border border-slate-200 p-2.5 rounded-xl text-sm outline-none focus:border-emerald-500 text-slate-500">
                    </div>
                </div>
                <button id="executeRegisterTriggerBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black text-sm py-3.5 rounded-xl shadow-md transition-all">Sign Up Profile 🚀</button>
                <div class="text-center text-xs pt-1">
                    <button onclick="window.shiftAuthSegmentView('login')" class="text-slate-500 font-bold hover:text-indigo-600 hover:underline">Already have an account? Login</button>
                </div>
            </div>

            <!-- TAB 3: FORGOT PASSWORD SEGMENT (EMAIL, NAME, DOB) -->
            <div id="authForgotSegment" class="hidden space-y-4">
                <div class="p-3 bg-amber-50 border border-amber-100 rounded-xl text-[11px] font-semibold text-amber-800 leading-snug mb-1">
                    🔒 Account verify karne ke liye apna registered Name aur DOB fill karein.
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">Registered Full Name</label>
                    <input type="text" id="forgotName" class="w-full bg-white border border-slate-200 p-3 rounded-xl text-sm outline-none focus:border-amber-500" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">Registered Email</label>
                    <input type="email" id="forgotEmail" class="w-full bg-white border border-slate-200 p-3 rounded-xl text-sm outline-none focus:border-amber-500" placeholder="name@example.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">Date of Birth (DOB)</label>
                    <input type="date" id="forgotDob" class="w-full bg-white border border-slate-200 p-2.5 rounded-xl text-sm outline-none focus:border-amber-500 text-slate-500">
                </div>
                <button id="executeForgotTriggerBtn" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-black text-sm py-3.5 rounded-xl shadow-md transition-all">Verify & Reset Password 🛠️</button>
                <div class="text-center text-xs pt-1">
                    <button onclick="window.shiftAuthSegmentView('login')" class="text-slate-500 font-bold hover:text-indigo-600 hover:underline">Back to Login</button>
                </div>
            </div>

        </div>
    </main>

    <!-- FOOTER -->
    <footer class="w-full bg-slate-900 text-slate-400 p-4 text-xs font-medium text-center tracking-wide shrink-0 border-t border-slate-800">
        <p>© 2026 LuminaEdu Networks. Secure Node Verification System Active.</p>
    </footer>

    <!-- DYNAMIC TRANSACTION LOGIC LAYER -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDEXmjIN8w2s2uXk0FTzC7ri4HhLetzV4E",
          authDomain: "luminaedu-ai786.firebaseapp.com",
          projectId: "luminaedu-ai786",
          storageBucket: "luminaedu-ai786.firebasestorage.app",
          messagingSenderId: "35041307389",
          appId: "1:35041307389:web:846f981017df7ad1382c94"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 🌟 FLUID VIEWPORT SWITCHER BETWEEN ROUTING PANELS
        window.shiftAuthSegmentView = function(viewMode) {
            const loginBlock = document.getElementById('authLoginSegment');
            const registerBlock = document.getElementById('authRegisterSegment');
            const forgotBlock = document.getElementById('authForgotSegment');
            const heading = document.getElementById('authInterfaceHeading');
            const subLabel = document.getElementById('authInterfaceSubLabel');

            loginBlock.classList.add('hidden'); registerBlock.classList.add('hidden'); forgotBlock.classList.add('hidden');

            if (viewMode === 'register') {
                registerBlock.classList.remove('hidden');
                heading.innerText = "Create Account";
                subLabel.innerText = "Join the workspace to manage proposed boards data.";
            } else if (viewMode === 'forgot') {
                forgotBlock.classList.remove('hidden');
                heading.innerText = "Recover Password";
                subLabel.innerText = "Verify credentials profile logs to trace your key.";
            } else {
                loginBlock.classList.remove('hidden');
                heading.innerText = "Contributor Sign In";
                subLabel.innerText = "Verify email & password to input proposed updates.";
            }
        };

        // 🚀 REGISTRATION ACTION PIPELINE
        document.getElementById('executeRegisterTriggerBtn').addEventListener('click', async () => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const password = document.getElementById('regPassword').value.trim();
            const dob = document.getElementById('regDob').value;

            if(!name || !email || !password || !dob) {
                alert("❌ Saari fields (Name, Email, Password, DOB) bharna mandatory hai!");
                return;
            }

            try {
                await addDoc(collection(db, "user_registry"), {
                    name: name,
                    email: email,
                    password: password,
                    dob: dob,
                    role: "Contributor",
                    timestamp: Date.now()
                });
                alert("🎉 Account successfully registered! Ab login karein.");
                window.shiftAuthSegmentView('login');
            } catch(e) { alert("Error: " + e.message); }
        });

        // 🚀 LOGIN ACTION PIPELINE
        document.getElementById('executeLoginTriggerBtn').addEventListener('click', async () => {
            const emailInput = document.getElementById('loginEmail').value.trim().toLowerCase();
            const passInput = document.getElementById('loginPassword').value.trim();

            if(!emailInput || !passInput) return alert("Email aur Password dono bharein!");

            // Hardcoded structural backup bypass for owner verification testing node
            if(emailInput === "admin@lumina.com" && passInput === "LuminaUser@2026") {
                sessionStorage.setItem("user_token", "verified_user");
                window.location.href = "dashboard.html";
                return;
            }

            try {
                const snap = await getDocs(collection(db, "user_registry"));
                let isAuthPassed = false;

                snap.forEach(docNode => {
                    const u = docNode.data();
                    if(u.email === emailInput && u.password === passInput) {
                        isAuthPassed = true;
                    }
                });

                if(isAuthPassed) {
                    sessionStorage.setItem("user_token", "verified_user");
                    window.location.href = "dashboard.html";
                } else {
                    alert("❌ Invalid email address or login password signature.");
                }
            } catch(e) { alert("Sync Error: " + e.message); }
        });

        // 🚀 FORGOT PASSWORD VERIFICATION PIPELINE (EMAIL + NAME + DOB CHANNELS)
        document.getElementById('executeForgotTriggerBtn').addEventListener('click', async () => {
            const nameInput = document.getElementById('forgotName').value.trim();
            const emailInput = document.getElementById('forgotEmail').value.trim().toLowerCase();
            const dobInput = document.getElementById('forgotDob').value;

            if(!nameInput || !emailInput || !dobInput) {
                alert("❌ Verification ke liye Name, Email, aur DOB teeno bharna zaroori hai!");
                return;
            }

            try {
                const snap = await getDocs(collection(db, "user_registry"));
                let foundPassword = "";

                snap.forEach(docNode => {
                    const u = docNode.data();
                    // Match all 3 channels safely to maintain high security privacy matrix
                    if(u.email === emailInput && u.name.toLowerCase() === nameInput.toLowerCase() && u.dob === dobInput) {
                        foundPassword = u.password;
                    }
                });

                if(foundPassword) {
                    alert(`🔑 Profile Verified!\nAapka Password hai: ${foundPassword}`);
                    window.shiftAuthSegmentView('login');
                } else {
                    alert("❌ Data matched nahi hua! Kripya sahi details entered karein.");
                }
            } catch(e) { alert("Error database sync: " + e.message); }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contributor Login | LuminaEdu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-xl max-w-md w-full space-y-4">
        <div class="text-center">
            <h2 class="text-xl font-bold text-slate-900">📝 Contributor Gateway</h2>
            <p class="text-xs text-slate-400 mt-1">Apne user credentials se login karein.</p>
        </div>
        <div class="space-y-3">
            <div>
                <label class="block text-xs font-bold text-slate-600 mb-1">Passkey Code</label>
                <input type="password" id="userPassKey" class="w-full bg-slate-50 border p-3 rounded-xl text-sm outline-none font-mono" placeholder="••••••••••••">
            </div>
            <button id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm py-3 rounded-xl shadow-md transition-all">Verify & Enter Dashboard ⚡</button>
        </div>
        <p class="text-xs text-center text-slate-500">Naye contributor hain? <a href="register.html" class="text-indigo-600 font-bold hover:underline">Register Karein</a></p>
    </div>
    <script type="module" src="user-auth.js"></script>
</body>
</html>

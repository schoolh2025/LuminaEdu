
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>विवरण सूचना केंद्र | LuminaEdu Matrix Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', 'Noto Sans Devanagari', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col text-slate-800 text-base">

    <!-- Universal Functional Semantic Header -->
    <header class="h-16 bg-white border-b px-6 flex items-center justify-between sticky top-0 z-50 shadow-sm">
        <span class="text-base font-black text-indigo-600 tracking-tight cursor-pointer" onclick="window.location.href='../index.html'">LuminaEdu Content Matrix</span>
        <a href="../index.html" class="bg-slate-800 text-white font-bold text-sm px-4 py-2.5 rounded-xl hover:bg-slate-900 transition-all flex items-center gap-1">🏠 मुख्य पृष्ठ पर जाएं (Go to Home)</a>
    </header>

    <div class="max-w-7xl w-full mx-auto p-4 lg:p-6 flex-1 grid grid-cols-1 lg:grid-cols-4 gap-6">
        <!-- Main Core Details Left Section -->
        <div class="lg:col-span-3 bg-white p-6 md:p-8 rounded-2xl border border-slate-200 shadow-sm space-y-6">
            <div id="jobTargetCoreRenderEngine">
                <p class="text-sm text-indigo-600 font-bold animate-pulse">क्लाउड डेटा सिंक हो रहा है...</p>
            </div>
        </div>

        <!-- Sidebar Assembly Framework Components -->
        <aside class="lg:col-span-1 space-y-4">
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm space-y-3">
                <h3 class="font-extrabold text-sm text-slate-800 uppercase tracking-wider border-b pb-2">📑 अन्य उपलब्ध रिक्तियां</h3>
                <div id="jobSidebarFeedCluster" class="space-y-3 text-sm text-indigo-600 font-bold leading-normal"></div>
            </div>
        </aside>
    </div>

    <!-- Footer Layout Area -->
    <footer class="bg-white border-t p-6 text-center text-sm text-slate-600 mt-12 font-semibold">
        <p>© 2026 LuminaEdu Automation Stream System Channels. <a href="../index.html" class="text-indigo-600 hover:underline">मुख्य पृष्ठ (Home Frame)</a></p>
    </footer>

    <script type="module">
        import { getFirestore, doc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import "../app.js";

        async function loadStructuralJobTemplateView() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const db = window.fbDB;
            if(!id) return;

            const docSnap = await getDoc(doc(db, "jobs", id));
            if(docSnap.exists()) {
                const j = docSnap.data();
                const container = document.getElementById('jobTargetCoreRenderEngine');
                
                container.style.fontSize = j.customFontSize || "16px";
                container.style.color = j.customFontColor || "#1e293b";

                container.innerHTML = `
                    <div class="border-b pb-4 mb-5">
                        <span class="px-3 py-1 rounded-full text-xs font-extrabold bg-indigo-50 text-indigo-700 uppercase border border-indigo-100">${j.type}</span>
                        <h2 class="text-2xl md:text-3xl font-black text-slate-900 mt-3 tracking-tight">${j.title}</h2>
                        <p class="text-sm text-slate-500 font-bold mt-1.5">🏛️ आधिकारिक बोर्ड प्राधिकारी: ${j.authority}</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 my-6">
                        <div class="bg-slate-50 p-5 rounded-xl border text-sm"><h4 class="font-bold text-base border-b pb-1.5 text-slate-800">💸 Application Fees Structures</h4><p class="mt-3 font-medium text-slate-700 whitespace-pre-line leading-relaxed">${j.feesDetails || 'N/A'}</p></div>
                        <div class="bg-slate-50 p-5 rounded-xl border text-sm"><h4 class="font-bold text-base border-b pb-1.5 text-slate-800">🎓 Qualification & Eligibility</h4><p class="mt-3 font-medium text-slate-700 whitespace-pre-line leading-relaxed">${j.eligibility || 'N/A'}</p></div>
                    </div>
                `;
            }

            onSnapshot(collection(db, "jobs"), (snap) => {
                const cl = document.getElementById('jobSidebarFeedCluster');
                if(!cl) return; cl.innerHTML = "";
                let count = 0;
                snap.forEach(d => {
                    const data = d.data();
                    if(d.id !== id && data.approvalStatus === 'Live' && count < 6) {
                        cl.innerHTML += `<a href="job.html?id=${d.id}" class="block truncate hover:underline py-1 border-b border-slate-100 font-bold text-slate-700">🔥 ${data.title}</a>`;
                        count++;
                    }
                });
            });
        }
        window.addEventListener('DOMContentLoaded', loadStructuralJobTemplateView);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - LuminaEdu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', 'Noto Sans Devanagari', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col text-slate-800 text-base md:text-lg">

    <header class="h-16 bg-white border-b px-6 flex items-center justify-between sticky top-0 z-50 shadow-sm">
        <span class="text-lg font-black text-indigo-600 tracking-tight cursor-pointer" onclick="window.location.href='../index.html'">LuminaEdu</span>
        <a href="../index.html" class="bg-slate-800 text-white font-bold text-sm px-4 py-2 rounded-xl hover:bg-slate-900 transition-all">🏠 Home</a>
    </header>

    <main class="max-w-xl w-full mx-auto p-6 md:p-10 bg-white border border-slate-200 shadow-sm rounded-2xl my-8 space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-black text-slate-900">Contact Us (संपर्क करें)</h1>
            <p class="text-sm font-bold text-indigo-600 mt-2">Humse kisi bhi sujhav ya puchtach ke liye sampark karein</p>
        </div>

        <div class="bg-indigo-50 border border-indigo-100 p-5 rounded-xl text-center space-y-2">
            <span class="text-xs font-bold text-indigo-600 uppercase tracking-wider block">Official Business Email Support</span>
            <a href="mailto:support@luminaedu.com" class="text-lg md:text-xl font-extrabold text-indigo-900 block hover:underline">support@luminaedu.com</a>
            <p class="text-xs text-slate-500">Hum aamtaur par 24 se 48 ghanton me reply karte hain.</p>
        </div>

        <form class="space-y-4 pt-2" onsubmit="event.preventDefault(); alert('🎉 Sujhav Darj Hua! Hum aapse jald hi sampark karenge.'); this.reset();">
            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Aapka Naam (Full Name)</label>
                <input type="text" required class="w-full bg-slate-50 border text-sm p-3 rounded-xl outline-none focus:border-indigo-500 font-medium" placeholder="Enter your name">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Email Address</label>
                <input type="email" required class="w-full bg-slate-50 border text-sm p-3 rounded-xl outline-none focus:border-indigo-500 font-medium" placeholder="name@domain.com">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Sandesh / Sujhav (Message)</label>
                <textarea required rows="4" class="w-full bg-slate-50 border text-sm p-3 rounded-xl outline-none focus:border-indigo-500 font-medium" placeholder="Apna sandesh yahan likhein..."></textarea>
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm py-3.5 rounded-xl transition-all shadow-md">Submit Message ⚡</button>
        </form>
    </main>

    <footer class="bg-white border-t p-6 text-center text-sm text-slate-500 font-semibold mt-auto">
        <p>© 2026 LuminaEdu. All Rights Reserved.</p>
    </footer>
</body>
</html>
